<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🌸 I Love You 🌸</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        .info {
            position: fixed;
            bottom: 15px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(106, 183, 255, 0.5); /* Color de texto del footer actualizado a azul */
            font-size: 12px;
            font-family: monospace;
            pointer-events: none;
        }

        .top-image {
            position: fixed;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 11;
            width: min(220px, calc(100vw - 32px));
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid rgba(155, 243, 255, 0.3); /* Bordes actualizados a azul */
            box-shadow: 0 0 22px rgba(106, 183, 255, 0.22); /* Sombra actualizada a azul */
            background: rgba(5, 12, 20, 0.35);
        }

        .top-image img {
            display: block;
            width: 100%;
            height: auto;
        }

        .music-player {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            width: min(520px, calc(100vw - 32px));
            padding: 14px 18px;
            border-radius: 999px;
            background: rgba(5, 12, 20, 0.72);
            border: 1px solid rgba(120, 170, 255, 0.28); /* Bordes actualizados a azul */
            box-shadow: 0 0 24px rgba(106, 183, 255, 0.18), inset 0 0 18px rgba(106, 183, 255, 0.08); /* Sombra actualizada a azul */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .music-player button {
            width: 42px;
            height: 42px;
            border: 0;
            border-radius: 50%;
            background: linear-gradient(135deg, #6ab7ff 0%, #9bf3ff 100%);
            color: #060d16;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            flex: 0 0 auto;
            box-shadow: 0 0 18px rgba(110, 170, 255, 0.45); /* Sombra de botón actualizada a azul */
        }

        .music-player button:active {
            transform: scale(0.98);
        }

        .music-player .track {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 0;
        }

        .music-player .title {
            color: rgba(215, 249, 255, 0.92);
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .music-player .bar {
            width: 100%;
            accent-color: #9bf3ff; /* Color de acento de la barra actualizado */
            cursor: pointer;
        }

        .music-player .time {
            display: flex;
            justify-content: space-between;
            color: rgba(180, 234, 255, 0.85);
            font-size: 11px;
            font-family: monospace;
        }
    </style>
</head>

<body>

    <canvas id="c"></canvas>

    <div class="top-image">
        <img src="img/IMG_20260709_064633.png" alt="la mas bella" />
    </div>

    <div class="info">
      🌸 I LOVE YOU 🌸
    </div>

    <div class="music-player" aria-label="Reproductor de música">
        <button id="playBtn" type="button">▶</button>
        <div class="track">
            <div class="title">pequeña pero ocupas gran espacio 💘</div>
            <input id="progress" class="bar" type="range" min="0" max="1000" value="0" />
            <div class="time">
                <span id="currentTime">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>
    </div>

    <audio id="music" preload="auto" loop>
        <source src="music.mp3" type="audio/mpeg" />
    </audio>

    <script>
        const canvas = document.getElementById("c");
        const ctx = canvas.getContext("2d");
        const music = document.getElementById("music");
        const playBtn = document.getElementById("playBtn");
        const progress = document.getElementById("progress");
        const currentTime = document.getElementById("currentTime");
        const duration = document.getElementById("duration");

        let W, H, CX, CY, SCALE;
        const DPR = Math.min(window.devicePixelRatio || 1, 2);

        const phrase = "  love you";
        const points = [];
        const TOTAL = 150;

        function resize() {
            W = window.innerWidth;
            H = window.innerHeight;

            canvas.width = W * DPR;
            canvas.height = H * DPR;

            canvas.style.width = W + "px";
            canvas.style.height = H + "px";

            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.scale(DPR, DPR);

            CX = W / 2;
            CY = H / 2 + 20;

            SCALE = Math.min(W, H) * 0.014;

            buildPoints();
        }

        function heart(t) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y =
                13 * Math.cos(t) -
                5 * Math.cos(2 * t) -
                2 * Math.cos(3 * t) -
                Math.cos(4 * t);

            return {
                x: x * SCALE,
                y: -y * SCALE
            };
        }

        function buildPoints() {
            points.length = 0;
            for (let i = 0; i < TOTAL; i++) {
                const t = (Math.PI * 2 * i) / TOTAL;
                const p = heart(t);
                points.push({
                    x: p.x,
                    y: p.y,
                    offset: Math.random() * Math.PI * 2
                });
            }
        }

        function drawWord(word, x, y, time) {
            const pulse = Math.sin(time * 2) * 2;

            ctx.save();
            ctx.translate(x, y);

            const fontSize = 11 + pulse;

            for (let s = 3; s >= 0; s--) {
                ctx.shadowBlur = s * 8;
                // --- CAMBIO DE COLOR: Color de sombra y brillo de neón actualizado a azul (#6ab7ff) ---
                ctx.shadowColor = `rgba(106, 183, 255, ${0.7 - s * 0.15})`;

                ctx.font = `${fontSize + s}px Arial`;
                ctx.fillStyle =
                    s === 0
                        ? "white"
                        // --- CAMBIO DE COLOR: Color de relleno de neón actualizado a azul claro (#9bf3ff) ---
                        : `rgba(155, 243, 255, 0.35)`;

                ctx.textAlign = "center";
                ctx.textBaseline = "middle";

                ctx.fillText(word, 0, 0);
            }

            ctx.restore();
        }

        function drawHeartLineGlow() {
            ctx.beginPath();
            for (let i = 0; i < points.length; i++) {
                const p = points[i];
                const x = CX + p.x;
                const y = CY + p.y;
                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }
            ctx.closePath();

            // --- CAMBIO DE COLOR: Color de la línea principal del corazón actualizado a azul (#6ab7ff) ---
            ctx.strokeStyle = "rgba(106, 183, 255, 0.25)";
            ctx.lineWidth = 2;
            ctx.shadowBlur = 20;
            // --- CAMBIO DE COLOR: Sombra de la línea actualizada a azul cyan (#9bf3ff) ---
            ctx.shadowColor = "#9bf3ff";

            ctx.stroke();
        }

        function animate(time = 0) {
            time *= 0.001;
            ctx.clearRect(0, 0, W, H);

            drawHeartLineGlow();

            for (let i = 0; i < points.length; i++) {
                const p = points[i];
                const wave = Math.sin(time * 2 + p.offset) * 4;
                const x = CX + p.x;
                const y = CY + p.y + wave;
                drawWord(phrase, x, y, time);
                if (i % 10 === 0) {
                    drawWord(phrase, x + 8, y - 6, time);
                }
            }

            requestAnimationFrame(animate);
        }

        function formatTime(seconds) {
            if (!Number.isFinite(seconds) || seconds < 0) return "0:00";
            const minutes = Math.floor(seconds / 60);
            const remainingSeconds = Math.floor(seconds % 60).toString().padStart(2, "0");
            return `${minutes}:${remainingSeconds}`;
        }

        playBtn.addEventListener("click", async () => {
            if (music.paused) {
                try {
                    await music.play();
                    playBtn.textContent = "❚❚";
                } catch (error) {
                    console.log("Auto-play prevented.");
                }
            } else {
                music.pause();
                playBtn.textContent = "▶";
            }
        });

        music.addEventListener("loadedmetadata", () => {
            duration.textContent = formatTime(music.duration);
        });

        music.addEventListener("timeupdate", () => {
            currentTime.textContent = formatTime(music.currentTime);
            if (Number.isFinite(music.duration) && music.duration > 0) {
                progress.value = Math.floor((music.currentTime / music.duration) * 1000);
            }
        });

        progress.addEventListener("input", () => {
            if (Number.isFinite(music.duration) && music.duration > 0) {
                music.currentTime = (progress.value / 1000) * music.duration;
            }
        });

        music.addEventListener("play", () => playBtn.textContent = "❚❚");
        music.addEventListener("pause", () => playBtn.textContent = "▶");
        music.addEventListener("ended", () => playBtn.textContent = "▶");

        window.addEventListener("resize", resize);
        resize();
        animate();

        // Intento de reproducción automática al cargar
        music.play().then(() => {
            playBtn.textContent = "❚❚";
        }).catch(() => {
            // El navegador bloqueó el autoplay. Se requiere interacción.
        });
    </script>

</body>
</html>
